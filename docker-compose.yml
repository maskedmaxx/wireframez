services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: wireframez
      POSTGRES_PASSWORD: wireframez
      POSTGRES_DB: wireframez
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wireframez"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - proxy

  grafana:
    image: grafana/grafana:9.5.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: wireframez
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboard.json:/var/lib/grafana/dashboards/wireframez.json
    depends_on:
      - prometheus

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      WIREFRAMEZ_DB_URL: host=postgres port=5432 user=wireframez password=wireframez dbname=wireframez sslmode=disable
      WIREFRAMEZ_SEED_FILE: /etc/wireframez/schemas.seed.json
    volumes:
      - ./docker/schemas.seed.json:/etc/wireframez/schemas.seed.json
    depends_on:
      postgres:
        condition: service_healthy

  registry:
    build:
      context: .
      dockerfile: Dockerfile.registry
    ports:
      - "8081:8081"
    environment:
      WIREFRAMEZ_DB_URL: host=postgres port=5432 user=wireframez password=wireframez dbname=wireframez sslmode=disable
      WIREFRAMEZ_SEED_FILE: /etc/wireframez/schemas.seed.json
    volumes:
      - ./docker/schemas.seed.json:/etc/wireframez/schemas.seed.json
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  grafana_data: