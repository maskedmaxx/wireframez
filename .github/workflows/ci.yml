name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wireframez
          POSTGRES_PASSWORD: wireframez
          POSTGRES_DB: wireframez
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run init SQL
        run: |
          PGPASSWORD=wireframez psql -h localhost -p 5433 -U wireframez -d wireframez -f docker/postgres/init.sql

      - name: Run tests
        env:
          WIREFRAMEZ_DB_URL: host=localhost port=5433 user=wireframez password=wireframez dbname=wireframez sslmode=disable
        run: go test ./internal/... -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run go vet
        run: go vet ./...

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t wireframez:${{ github.sha }} .